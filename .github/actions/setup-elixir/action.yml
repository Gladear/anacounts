name: Setup Elixir
description: Install Elixir and Erlang

outputs:
  otp-version:
    description: Installed OTP version
    value: ${{ steps.elixir-install.outputs.otp-version }}
  elixir-version:
    description: Installed Elixir version
    value: ${{ steps.elixir-install.outputs.elixir-version }}

runs:
  using: "composite"
  steps:
    - name: Set up Elixir
      id: elixir-install
      uses: erlef/setup-beam@54075bcc5e249e4758d363f27d099f55d843f124 # v1.24.1
      with:
        version-file: .tool-versions
        version-type: strict
