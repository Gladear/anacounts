name: Build PLT
description: Build dialyzer's PLT files

inputs:
  otp-version:
    description: Installed OTP version, from the setup-elixir action
    required: true
  elixir-version:
    description: Installed Elixir version, from the setup-elixir action
    required: true

runs:
  using: "composite"
  steps:
    # Taken from dialyxir's documentation
    # https://github.com/jeremyjh/dialyxir/blob/0091928de1ec01e30f82c50856f2dfe0a8f918ce/docs/github_actions.md
    - name: Restore PLT cache
      id: plt_cache
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        key: |
          plt-${{ runner.os }}-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
        restore-keys: |
          plt-${{ runner.os }}-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-
        path: |
          priv/plts

    # Create dialyzer's PLTs if no cache was found
    - name: Create PLTs
      if: steps.plt_cache.outputs.cache-hit != 'true'
      shell: bash
      run: mix dialyzer --plt

    # By default, the GitHub Cache action will only save the cache if all steps in the job succeed,
    # so we separate the cache restore and save steps in case running dialyzer fails.
    - name: Save PLT cache
      id: plt_cache_save
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      if: steps.plt_cache.outputs.cache-hit != 'true'
      with:
        key: |
          plt-${{ runner.os }}-${{ inputs.otp-version }}-${{ inputs.elixir-version }}-${{ hashFiles('**/mix.lock') }}
        path: |
          priv/plts
