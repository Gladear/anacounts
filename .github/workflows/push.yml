name: Push
on:
  push:
    branches: [main]

# Prevent concurrent runs on the same branch. In case of conflict,
# the oldest run will be cancelled.
concurrency:
  group: ${{ github.workflow }}-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: ./.github/workflows/test.yml

  deploy:
    needs: validate
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Login to Docker registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # By default, the context is the git context. Set it to the current
          # directory to include make sure `.git` directory is available.
          context: .
          platforms: linux/arm64/v8
          tags: ${{ secrets.REGISTRY_URL }}/anacounts:latest
