name: Test

on:
  workflow_call:

# Prevent concurrent runs on the same branch. In case of conflict,
# the oldest run will be cancelled.
concurrency:
  group: ${{ github.workflow }}-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Ensure everything is run in the test environment,
  # avoiding multiple compilations of the same code.
  MIX_ENV: test

jobs:
  build:
    name: Validate code
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup test environment
        uses: ./.github/actions/test-setup
      - name: Run code validation
        uses: ./.github/actions/test-code

  test:
    name: Build and test
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_DB: anacounts_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        # set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup test environment
        uses: ./.github/actions/test-setup
      - name: Run unit tests
        uses: ./.github/actions/test-unit

  dockerfile:
    name: Validate Dockerfile
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build Dockerfile
        uses: ./.github/actions/test-dockerfile
